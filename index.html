<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chiếc Nón Kì Diệu - Toàn Diện</title>
  <style>
    :root { 
      --bg: linear-gradient(135deg, #ffffff, #f5f5f5, #efefef); 
      --panel: #ffffff; 
      --text: #1a1a1a; 
      --ok: #00d4ff; 
      --bad: #ff006e; 
      --warn: #ffb703; 
      --line: #e0e0e0; 
      --accent: #00a8cc;
      --accent2: #ff006e;
      --accent3: #ffb703;
    }
    * { box-sizing:border-box; }
    body { 
      margin:0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: var(--bg);
      color: var(--text); 
      overflow-x: hidden;
      min-height: 100vh;
    }
    
    /* Navigation Bar */
    nav { 
      background: rgba(255, 255, 255, 0.95); 
      backdrop-filter: blur(10px);
      padding: 15px; 
      display: flex; 
      justify-content: center; 
      gap: 15px; 
      border-bottom: 2px solid var(--accent); 
      position: sticky; 
      top: 0; 
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 168, 204, 0.2);
    }
    nav button { 
      padding: 12px 25px; 
      border-radius: 25px; 
      border: 2px solid var(--line); 
      background: transparent;
      color: var(--text); 
      cursor: pointer; 
      font-weight: bold;
      transition: all 0.3s ease;
      font-size: 15px;
    }
    nav button:hover { 
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    nav button.active { 
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: white; 
      box-shadow: 0 0 20px rgba(0, 168, 204, 0.5);
      color: white;
    }

    .page { display: none; padding: 30px; animation: fadeIn 0.4s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Control Page */
    .control-grid { display: grid; grid-template-columns: 1fr 350px; gap: 25px; }
    .wheel-box { 
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 25px; 
      padding: 25px; 
      text-align: center; 
      border: 2px solid var(--accent);
      box-shadow: 0 8px 30px rgba(0, 168, 204, 0.15);
    }
    canvas { max-width: 100%; height: auto; border-radius: 50%; }
    .sidebar { display: flex; flex-direction: column; gap: 15px; }
    
    /* Team Page */
    .teams-container { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap: 20px;
      margin-top: 20px;
    }
    .team-card { 
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 2px solid var(--accent);
      border-radius: 20px; 
      padding: 20px; 
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(0, 168, 204, 0.1);
    }
    .team-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent2);
      box-shadow: 0 12px 35px rgba(255, 0, 110, 0.15);
    }
    .team-card h2 {
      margin: 0 0 15px 0;
      font-size: 24px;
      color: var(--accent);
    }
    .score-big { 
      font-size: 56px; 
      font-weight: 900; 
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 15px 0; 
    }
    .btn-score { 
      padding: 8px 15px; 
      font-size: 16px; 
      margin: 0 5px; 
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: rgba(0, 168, 204, 0.15);
      color: var(--accent);
      font-weight: bold;
      transition: all 0.2s ease;
    }
    .btn-score:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.05);
    }

    /* Effects Container */
    .effects-section {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--line);
    }
    .effects-section h4 {
      color: var(--accent3);
      margin: 10px 0;
      font-size: 14px;
    }
    .effects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .effect-btn {
      padding: 8px;
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      background: rgba(255, 183, 3, 0.1);
      color: var(--accent3);
      transition: all 0.2s ease;
      font-weight: bold;
    }
    .effect-btn:hover {
      background: var(--accent3);
      color: white;
      transform: scale(1.05);
    }
    .effect-btn.active {
      background: var(--accent3);
      color: white;
      border-color: var(--accent3);
    }
    .effect-badge {
      display: inline-block;
      padding: 4px 10px;
      margin: 3px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: bold;
      background: rgba(255, 183, 3, 0.15);
      color: var(--accent3);
      border: 1px solid var(--accent3);
    }

    /* Question Page */
    .q-display { 
      max-width: 900px; 
      margin: 40px auto; 
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 40px; 
      border-radius: 25px; 
      border: 2px solid var(--accent); 
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 168, 204, 0.15);
    }
    .q-text { 
      font-size: 32px; 
      font-weight: bold; 
      color: var(--accent); 
      margin-bottom: 30px; 
    }
    .options { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 20px; 
    }
    .opt { 
      background: rgba(224, 224, 224, 0.4);
      padding: 20px; 
      border-radius: 15px; 
      font-size: 20px; 
      border: 2px solid var(--line);
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text);
    }
    .opt:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 168, 204, 0.2);
    }
    .opt.correct { 
      background: linear-gradient(135deg, var(--ok), var(--accent)) !important;
      color: white;
      border-color: white;
      box-shadow: 0 0 20px rgba(0, 168, 204, 0.5);
    }
    .opt.wrong {
      background: linear-gradient(135deg, var(--bad), #ff7aa6) !important;
      color: white;
      border-color: white;
      box-shadow: 0 0 20px rgba(255, 0, 110, 0.25);
    }

    /* Utils */
    .log { 
      height: 200px; 
      overflow-y: auto; 
      background: rgba(224, 224, 224, 0.3);
      padding: 12px; 
      border-radius: 12px; 
      font-size: 13px; 
      margin-top: 15px; 
      text-align: left;
      border: 1px solid var(--line);
      color: var(--text);
    }
    .log div { margin: 5px 0; color: var(--accent); }
    .btn-main { 
      background: linear-gradient(135deg, var(--ok), var(--accent2));
      color: white; 
      padding: 15px; 
      width: 100%; 
      font-size: 20px; 
      border-radius: 15px; 
      margin-top: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 168, 204, 0.3);
    }
    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 168, 204, 0.5);
    }
    .btn-main:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button { font-family: inherit; }

    /* Modal Popup */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }
    .modal.show {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    .modal-content {
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(250,250,250,0.98));
      backdrop-filter: none;
      border-radius: 0;
      padding: 28px;
      width: 100%;
      height: 100%;
      max-width: none;
      border: none;
      box-shadow: none;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: stretch;
    }
    /* Centered inner container to keep question area proportioned */
    .modal-inner {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1 1 auto;
      justify-content: center;
    }
    /* Position close button top-right */
    .modal-header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
      position: relative;
    }
    .close-btn {
      position: absolute;
      right: 28px;
      top: 14px;
      background: var(--bad);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      z-index: 30;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }
    .modal-header h2 {
      margin: 0;
      color: var(--accent);
      font-size: 22px;
      font-weight: 700;
    }
    .modal-timer {
      position: absolute;
      right: 86px; /* room for close button */
      top: 18px;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      background: rgba(0,0,0,0.02);
      padding: 6px 10px;
      border-radius: 10px;
    }
    /* duplicate block removed to avoid conflicts */
    }
    .close-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 12px rgba(255, 0, 110, 0.35);
    }
    .modal-question {
      text-align: center;
      margin: 4px 0 6px 0;
    }
    .modal-question .q-text {
      font-size: 44px;
      margin-bottom: 22px;
      color: var(--accent);
      line-height: 1.2;
      font-weight: 800;
    }
    .modal-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .modal-opt {
      background: rgba(224, 224, 224, 0.45);
      padding: 24px;
      border-radius: 14px;
      font-size: 20px;
      border: 2px solid var(--line);
      cursor: pointer;
      transition: all 0.22s ease;
      text-align: left;
      color: var(--text);
      min-height: 90px;
      display: flex;
      align-items: center;
    }
    .modal-opt:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0, 168, 204, 0.12);
    }
    .modal-opt.correct {
      background: linear-gradient(135deg, var(--ok), var(--accent)) !important;
      color: white;
      border-color: white;
      box-shadow: 0 0 20px rgba(0, 168, 204, 0.25);
    }
    .modal-opt.wrong {
      background: linear-gradient(135deg, var(--bad), #ff7aa6) !important;
      color: white;
      border-color: white;
      box-shadow: 0 0 20px rgba(255, 0, 110, 0.25);
    }
    .modal-buttons {
      display: flex;
      gap: 18px;
      justify-content: center;
      align-items: center;
      margin-top: 6px;
    }
    .modal-btn {
      padding: 18px 26px;
      border-radius: 14px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      font-weight: 800;
      transition: all 0.18s ease;
      flex: 1;
      min-width: 180px;
    }
    .modal-btn-primary {
      background: linear-gradient(135deg, var(--ok), var(--accent2));
      color: white;
    }
    .modal-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 168, 204, 0.25); }
    .modal-btn-secondary {
      background: rgba(0, 168, 204, 0.12);
      color: var(--accent);
    }
    .modal-btn-secondary:hover { background: var(--accent); color: white; }
    .modal-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .modal-opt {
      background: rgba(224, 224, 224, 0.4);
      padding: 15px;
      border-radius: 12px;
      font-size: 16px;
      border: 2px solid var(--line);
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      color: var(--text);
    }
    .modal-opt:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 168, 204, 0.2);
    }
    .modal-opt.correct {
      background: linear-gradient(135deg, var(--ok), var(--accent)) !important;
      color: white;
      border-color: white;
      box-shadow: 0 0 20px rgba(0, 168, 204, 0.5);
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .modal-btn {
      padding: 18px 26px;
      border-radius: 14px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      font-weight: 800;
      transition: all 0.18s ease;
    }
    .modal-btn-primary {
      background: linear-gradient(135deg, var(--ok), var(--accent2));
      color: white;
      flex: 1;
    }
    .modal-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 168, 204, 0.5);
    }
    .modal-btn-secondary {
      background: rgba(0, 168, 204, 0.15);
      color: var(--accent);
      min-width: 100px;
    }
    .modal-btn-secondary:hover {
      background: var(--accent);
      color: white;
    }

    /* Extra scaling for very large screens */
    @media (min-width: 1400px) {
      .modal-question .q-text { font-size: 56px; }
      .modal-opt { font-size: 24px; padding: 28px; min-height: 120px; }
      .modal-btn { font-size: 20px; padding: 22px 36px; }
      .modal-timer { font-size: 22px; right: 120px; }
    }
  </style> 
</head>
<body>

<nav>
  <button onclick="showPage('control')" id="btn-control" class="active">🎮 ĐIỀU KHIỂN</button>
  <button onclick="showPage('teams')" id="btn-teams">📊 BẢNG ĐIỂM</button>
  <button onclick="showPage('questions')" id="btn-questions">❓ CÂU HỎI</button>
</nav>

<div id="page-control" class="page active">
  <div class="control-grid">
    <div class="wheel-box">
      <canvas id="wheel" width="700" height="700"></canvas>
      <button class="btn-main" id="btnSpin">SPIN (QUAY)</button>
      <h2 id="resultDisplay" style="color:var(--warn)">KẾT QUẢ: ---</h2>
    </div>
    
    <div class="sidebar">
      <div class="team-card" style="margin-bottom: 15px;">
        <h3>Trạng thái: <span id="statusText" style="color:var(--ok)">SẴN SÀNG</span></h3>
        <p>Lượt đội: <b id="turnName">Chưa buzz</b></p>
      </div>
      <div class="team-card">
        <h3>Nhật ký</h3>
        <div id="log" class="log"></div>
      </div>
      <button onclick="resetGame()" style="background:var(--bad); color:white; margin-top:10px; padding:10px; width:100%; border-radius:10px; border:none; cursor:pointer;">RESET GAME</button>
    </div>
  </div>
</div>

<div id="page-teams" class="page">
  <h1 style="text-align:center">BẢNG ĐIỂM HIỆN TẠI</h1>
  <div class="teams-container" id="teamsList"></div>
</div>

<div id="page-questions" class="page">
  <div class="q-display">
    <div id="qNum" style="color:var(--muted)">Câu hỏi số 1</div>
    <div id="qText" class="q-text">Vui lòng quay nón để bắt đầu câu hỏi</div>
    <div id="qOptions" class="options"></div>
    <div style="margin-top:30px; display:flex; justify-content: center; gap:10px;">
        <button onclick="changeQ(-1)">Câu trước</button>
        <button onclick="revealAnswer()" style="background:var(--ok); color:white;">Mở đáp án</button>
        <button onclick="changeQ(1)">Câu tiếp</button>
    </div>
  </div>
</div>

<!-- Question Popup Modal -->
<div id="questionModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalQNum">Câu hỏi số 1</h2>
      <div id="modalTimer" class="modal-timer">Thời gian: <span id="modalTimerDisplay">10</span>s</div>
      <button class="close-btn" onclick="closeQuestionModal()">×</button>
    </div>

    <div class="modal-inner">
      <div class="modal-question">
        <div id="modalQText" class="q-text"></div>
        <div id="modalQOptions" class="modal-options"></div>
      </div>

      <div class="modal-buttons">
        <button id="modalStartBtn" class="modal-btn modal-btn-secondary" onclick="startModalTimer()">BẮT ĐẦU</button>
        <button id="modalRevealBtn" class="modal-btn modal-btn-primary" onclick="revealAnswerModal()">MỞ ĐÁP ÁN</button>
        <button id="modalNextBtn" class="modal-btn modal-btn-secondary" onclick="nextQuestionModal()">CÂU TIẾP →</button>
      </div>
    </div>
  </div>
</div>

<script>
/** DỮ LIỆU HỆ THỐNG **/
const CELLS = [
  { label:"+10", color: "#FF6B6B", val: 10 }, { label:"+20", color: "#FF8E72", val: 20 },
  { label:"+30", color: "#FFA500", val: 50 }, { label:"-10", color: "#FFD93D", val: -10 },
  { label:"X2", color: "#6BCB77", val: 0 }, { label:"+10", color: "#4D96FF", val: 10 },
  { label:"+20", color: "#5F4BE6", val: 20 }, { label:"TẤN CÔNG", color: "#E535AB", val: -999 },
  { label:"+10", color: "#FF006E", val: 10 },
  { label:"CƯỚP LƯỢT", color: "#FB5607", val: 0 }
];

const QUESTIONS = [
  { t: "Thực dân Pháp nổ súng xâm lược Việt Nam vào ngày nào?", o: ["1/9/1858","2/9/1945","19/8/1945","3/2/1930"], a: 0 },
  { t: "Pháp nổ súng xâm lược Việt Nam đầu tiên ở đâu?", o: ["Huế","Hà Nội","Đà Nẵng","Sài Gòn"], a: 2 },
  { t: "Sau khi Pháp xâm lược, Việt Nam trở thành gì?", o: ["Thuộc địa của Pháp","Đồng minh của Pháp","Quốc gia độc lập","Thuộc địa của Anh"], a: 0 },
  { t: "Phong trào yêu nước theo lập trường phong kiến tiêu biểu là phong trào nào?", o: ["Đông Du","Duy Tân","Cần Vương","Việt Minh"], a: 2 },
  { t: "Các phong trào yêu nước trước năm 1930 đều có kết quả như thế nào?", o: ["Thành công","Thất bại","Không xảy ra","Được Pháp ủng hộ"], a: 1 },
  { t: "Sự thất bại của các phong trào yêu nước cho thấy điều gì?", o: ["Cách mạng đã thành công","Cách mạng không cần lãnh đạo","Khủng hoảng đường lối cứu nước","Không cần đấu tranh"], a: 2 },
  { t: "Cách mạng Tháng Mười Nga thắng lợi vào năm nào?", o: ["1914","1917","1920","1930"], a: 1 },
  { t: "Cách mạng Tháng Mười Nga do ai lãnh đạo?", o: ["Karl Marx","Hồ Chí Minh","V.I. Lênin","Stalin"], a: 2 },
  { t: "Quốc tế Cộng sản được thành lập vào năm nào?", o: ["1917","1918","1919","1920"], a: 2 },
  { t: "Quốc tế Cộng sản còn gọi là gì?", o: ["Quốc tế I","Quốc tế II","Quốc tế III","Quốc tế IV"], a: 2 },
  { t: "Tháng 7/1920, Nguyễn Ái Quốc đọc tài liệu nào của Lênin?", o: ["Tuyên ngôn Cộng sản","Luận cương về vấn đề dân tộc và thuộc địa","Tư bản luận","Đường cách mệnh"], a: 1 },
  { t: "Việc tiếp nhận Luận cương của Lênin giúp Nguyễn Ái Quốc xác định con đường gì?", o: ["Con đường phong kiến","Con đường tư sản","Con đường cách mạng vô sản","Con đường quân chủ"], a: 2 },
  { t: "Nguyễn Ái Quốc tham gia sáng lập Đảng Cộng sản Pháp vào năm nào?", o: ["1919","1920","1925","1930"], a: 1 },
  { t: "Sự kiện Nguyễn Ái Quốc tham gia sáng lập Đảng Cộng sản Pháp diễn ra tại đại hội nào?", o: ["Đại hội Paris","Đại hội Tours","Đại hội Moskva","Đại hội Bắc Kinh"], a: 1 },
  { t: "Sự kiện năm 1920 đánh dấu điều gì?", o: ["Nguyễn Ái Quốc trở thành người cộng sản đầu tiên của Việt Nam","Việt Nam giành độc lập","Pháp rút khỏi Việt Nam","Thành lập Đảng Cộng sản Việt Nam"], a: 0 },

  { t: "Hội nghị hợp nhất các tổ chức cộng sản diễn ra vào năm nào?", o: ["1929","1930","1935","1945"], a: 1 },

let teams = [
    { name: "Đội 1", score: 0, effects: { immune: false, x2: false, attack: false, steal_turn: false } },
    { name: "Đội 2", score: 0, effects: { immune: false, x2: false, attack: false, steal_turn: false } },
    { name: "Đội 3", score: 0, effects: { immune: false, x2: false, attack: false, steal_turn: false } },
    { name: "Đội 4", score: 0, effects: { immune: false, x2: false, attack: false, steal_turn: false } },
    { name: "Đội 5", score: 0, effects: { immune: false, x2: false, attack: false, steal_turn: false } }
];

let currentQ = 0;
let isSpinning = false;
let wheelAngle = 0;
let nextQuestionOnSpin = false; // if true, next spin will advance to the next question automatically
let questionAnswered = false;
let modalAnswered = false;

/** LOGIC VÒNG QUAY **/
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

function drawWheel() {
    const n = CELLS.length;
    const slice = (Math.PI * 2) / n;
    ctx.clearRect(0, 0, 700, 700);
    CELLS.forEach((cell, i) => {
        const a = wheelAngle + i * slice;
        ctx.beginPath(); ctx.moveTo(350, 350);
        ctx.arc(350, 350, 340, a, a + slice);
        ctx.fillStyle = cell.color; ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();
        ctx.save(); ctx.translate(350, 350); ctx.rotate(a + slice/2);
        ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 20px Arial";
        ctx.fillText(cell.label, 320, 10); ctx.restore();
    });
    // Kim chỉ
    ctx.fillStyle = "white"; ctx.beginPath();
    ctx.moveTo(680, 350); ctx.lineTo(700, 330); ctx.lineTo(700, 370); ctx.fill();
}

document.getElementById("btnSpin").onclick = () => {
    if(isSpinning) return;
    isSpinning = true;
    let duration = 4000;
    let start = performance.now();
    let spinAngle = Math.random() * 360 + 1440;
    
    function animate(now) {
        let p = Math.min((now - start) / duration, 1);
        let ease = 1 - Math.pow(1 - p, 3);
        wheelAngle = (ease * spinAngle * Math.PI) / 180;
        drawWheel();
        if(p < 1) requestAnimationFrame(animate);
        else {
            isSpinning = false;
            let n = CELLS.length;
            let slice = (Math.PI * 2) / n;
            let norm = (Math.PI * 2 - (wheelAngle % (Math.PI * 2))) % (Math.PI * 2);
            let idx = Math.floor(norm / slice);
            document.getElementById("resultDisplay").innerText = "KẾT QUẢ: " + CELLS[idx].label;
            addLog("Quay vào ô: " + CELLS[idx].label);
            // If an answer was revealed previously, advance to next question on this spin
            if(nextQuestionOnSpin) {
                currentQ = Math.min(QUESTIONS.length - 1, currentQ + 1);
                nextQuestionOnSpin = false;
            }
            // Tự động hiển thị popup câu hỏi
            showQuestionModal();
        }
    }
    requestAnimationFrame(animate);
};

/** LOGIC ĐIỀU HƯỚNG **/
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.getElementById('btn-' + id).classList.add('active');
    if(id === 'teams') renderTeams();
    if(id === 'questions') renderQuestion();
}

/** LOGIC BẢNG ĐIỂM **/
function renderTeams() {
    const list = document.getElementById("teamsList");
    list.innerHTML = "";
    teams.forEach((t, i) => {
        const effects = t.effects;
        let effectBadges = '';
        if(effects.immune) effectBadges += '<span class="effect-badge">🛡️ Miễn</span>';
        if(effects.x2) effectBadges += '<span class="effect-badge">✖️ 2x</span>';
        if(effects.attack) effectBadges += '<span class="effect-badge">⚔️ Tấn công</span>';
        if(effects.steal_turn) effectBadges += '<span class="effect-badge">🏴 Cướp lượt</span>';
        
        list.innerHTML += `
            <div class="team-card">
                <h2>${t.name}</h2>
                <div class="score-big" id="score-${i}">${t.score}</div>
                <div style="margin: 15px 0; display: flex; gap: 8px; justify-content: center;">
                    <button class="btn-score" onclick="updateScore(${i}, 10)">+10</button>
                    <button class="btn-score" onclick="updateScore(${i}, -10)">-10</button>
                    <button class="btn-score" onclick="updateScore(${i}, 20)">+20</button>
                </div>
                <div class="effects-section">
                    <h4>⚡ HIỆU ỨNG</h4>
                    <div class="effects-grid">
                        <button class="effect-btn ${effects.immune ? 'active' : ''}" onclick="toggleEffect(${i}, 'immune')">🛡️ Miễn</button>
                        <button class="effect-btn ${effects.x2 ? 'active' : ''}" onclick="toggleEffect(${i}, 'x2')">✖️ 2x</button>
                        <button class="effect-btn ${effects.attack ? 'active' : ''}" onclick="toggleEffect(${i}, 'attack')">⚔️ Tấn công</button>
                        <button class="effect-btn ${effects.steal_turn ? 'active' : ''}" onclick="toggleEffect(${i}, 'steal_turn')">🏴 Cướp lượt</button>
                    </div>
                    ${effectBadges ? `<div style="margin-top: 10px;">${effectBadges}</div>` : ''}
                </div>
            </div>
        `;
    });
}

function updateScore(idx, val) {
    teams[idx].score += val;
    addLog(`${teams[idx].name} thay đổi ${val} điểm → Tổng: ${teams[idx].score}`);
    renderTeams();
}

function toggleEffect(idx, effect) {
    teams[idx].effects[effect] = !teams[idx].effects[effect];
    const effectNames = {
        'immune': 'Miễn nhiễm',
        'x2': 'Nhân đôi điểm',
        'attack': 'Tấn công',
        'steal_turn': 'Cướp lượt'
    };
    const action = teams[idx].effects[effect] ? 'KÍCH HOẠT' : 'HỦY';
    addLog(`${teams[idx].name} ${action} hiệu ứng: ${effectNames[effect]}`);
    renderTeams();
}

/** LOGIC CÂU HỎI **/
function renderQuestion() {
    const q = QUESTIONS[currentQ];
    document.getElementById("qNum").innerText = `Câu hỏi số ${currentQ + 1} / ${QUESTIONS.length}`;
    document.getElementById("qText").innerText = q.t;
    const optDiv = document.getElementById("qOptions");
    optDiv.innerHTML = "";
    // reset answered state
    questionAnswered = false;
    q.o.forEach((o, i) => {
        optDiv.innerHTML += `<div class="opt" id="opt-${i}">${String.fromCharCode(65+i)}. ${o}</div>`;
    });

    // attach click handlers
    q.o.forEach((o, i) => {
        const el = document.getElementById(`opt-${i}`);
        if(!el) return;
        el.onclick = () => {
            if(questionAnswered) return;
            questionAnswered = true;
            const correctIdx = QUESTIONS[currentQ].a;
            if(i === correctIdx) {
                el.classList.add('correct');
                addLog(`Chọn đáp án ${String.fromCharCode(65+i)} đúng cho câu ${currentQ+1}`);
            } else {
                el.classList.add('wrong');
                const corr = document.getElementById(`opt-${correctIdx}`);
                if(corr) corr.classList.add('correct');
                addLog(`Chọn đáp án ${String.fromCharCode(65+i)} SAI cho câu ${currentQ+1}`);
            }
        };
    });
}

function revealAnswer() {
    const correctIdx = QUESTIONS[currentQ].a;
    const el = document.getElementById(`opt-${correctIdx}`);
    if(el) el.classList.add('correct');
    questionAnswered = true;
    addLog(`Đã mở đáp án câu ${currentQ + 1}`);
}

function changeQ(dir) {
    currentQ = Math.max(0, Math.min(QUESTIONS.length - 1, currentQ + dir));
    renderQuestion();
}

function addLog(m) {
    const l = document.getElementById("log");
    l.innerHTML = `<div>• ${m}</div>` + l.innerHTML;
}

function resetGame() {
    if(confirm("Bạn muốn reset lại toàn bộ điểm số?")) {
        teams.forEach(t => {
            t.score = 0;
            t.effects = { immune: false, x2: false, attack: false, steal_turn: false };
        });
        currentQ = 0;
        addLog("🔄 ĐÃ RESET GAME - Tất cả điểm số và hiệu ứng về 0");
        renderTeams();
    }
}

/** LOGIC MODAL POPUP CÂU HỎI **/
function showQuestionModal() {
    renderQuestionModal();
    document.getElementById("questionModal").classList.add("show");
    // prevent background scroll while modal open
    document.body.style.overflow = 'hidden';
}

function closeQuestionModal() {
    // stop any running timer and restore body scroll
    stopModalTimer();
    document.getElementById("questionModal").classList.remove("show");
    document.body.style.overflow = '';
}

function renderQuestionModal() {
    const q = QUESTIONS[currentQ];
    document.getElementById("modalQNum").innerText = `Câu hỏi số ${currentQ + 1} / ${QUESTIONS.length}`;
    document.getElementById("modalQText").innerText = q.t;
    const optDiv = document.getElementById("modalQOptions");
    optDiv.innerHTML = "";
    // reset modal answered state
    modalAnswered = false;
    q.o.forEach((o, i) => {
        optDiv.innerHTML += `<div class="modal-opt" id="modalOpt-${i}">${String.fromCharCode(65+i)}. ${o}</div>`;
    });
    // reset timer/UI state
    const timerDisplay = document.getElementById('modalTimerDisplay');
    if(timerDisplay) timerDisplay.innerText = 10;
    const startBtn = document.getElementById('modalStartBtn'); if(startBtn) { startBtn.disabled = false; startBtn.style.opacity = ''; }
    const nextBtn = document.getElementById('modalNextBtn'); if(nextBtn) nextBtn.disabled = false;
    const revealBtn = document.getElementById('modalRevealBtn'); if(revealBtn) revealBtn.disabled = false;
    // remove previous answer highlight and attach click handlers
    q.o.forEach((o, i) => { 
        const el = document.getElementById(`modalOpt-${i}`);
        if(el) {
            el.classList.remove('correct','wrong');
            el.onclick = () => {
                if(modalAnswered) return;
                modalAnswered = true;
                const correctIdx = QUESTIONS[currentQ].a;
                if(i === correctIdx) {
                    el.classList.add('correct');
                    addLog(`(Modal) Chọn đáp án ${String.fromCharCode(65+i)} đúng cho câu ${currentQ+1}`);
                } else {
                    el.classList.add('wrong');
                    const corr = document.getElementById(`modalOpt-${correctIdx}`);
                    if(corr) corr.classList.add('correct');
                    addLog(`(Modal) Chọn đáp án ${String.fromCharCode(65+i)} SAI cho câu ${currentQ+1}`);
                }
            };
        }
    });
}

let modalTimerInterval = null;
let modalTimeLeft = 0;

function startModalTimer() {
    // reset any running timer
    stopModalTimer();
    modalTimeLeft = 10;
    const display = document.getElementById('modalTimerDisplay'); if(display) display.innerText = modalTimeLeft;
    const startBtn = document.getElementById('modalStartBtn'); if(startBtn) startBtn.disabled = true;
    const nextBtn = document.getElementById('modalNextBtn'); if(nextBtn) nextBtn.disabled = true;

    modalTimerInterval = setInterval(() => {
        modalTimeLeft--;
        const display = document.getElementById('modalTimerDisplay'); if(display) display.innerText = modalTimeLeft;
        if(modalTimeLeft <= 0) {
            stopModalTimer();
            revealAnswerModal();
        }
    }, 1000);
}

function stopModalTimer() {
    if(modalTimerInterval) {
        clearInterval(modalTimerInterval);
        modalTimerInterval = null;
    }
    const startBtn = document.getElementById('modalStartBtn'); if(startBtn) { startBtn.disabled = false; startBtn.style.opacity = ''; }
    const nextBtn = document.getElementById('modalNextBtn'); if(nextBtn) nextBtn.disabled = false;
}

function revealAnswerModal() {
    // stop timer if running
    stopModalTimer();
    const correctIdx = QUESTIONS[currentQ].a;
    const el = document.getElementById(`modalOpt-${correctIdx}`);
    if(el) el.classList.add('correct');
    modalAnswered = true;
    addLog(`Đã mở đáp án câu ${currentQ + 1}`);
    // mark that next spin should move to next question automatically
    nextQuestionOnSpin = true;
    // enable next
    const nextBtn = document.getElementById('modalNextBtn'); if(nextBtn) nextBtn.disabled = false;
}

function nextQuestionModal() {
    currentQ = Math.min(QUESTIONS.length - 1, currentQ + 1);
    nextQuestionOnSpin = false; // user advanced manually, cancel pending auto-advance
    renderQuestionModal();
}

function prevQuestionModal() {
    currentQ = Math.max(0, currentQ - 1);
    renderQuestionModal();
}

// Đóng modal khi bấm ESC
document.addEventListener("keydown", (e) => {
    if(e.key === "Escape") {
        const modal = document.getElementById("questionModal");
        if(modal && modal.classList.contains("show")) {
            closeQuestionModal();
        }
    }
});

// Khởi tạo lần đầu
drawWheel();
renderTeams();
</script>
